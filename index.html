<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 열쇠 모으기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ───── 설정 화면 ───── -->
<div id="setup-screen" class="screen active">
    <div class="setup-wrap">
        <h1>🎁 열쇠 모으기 게임</h1>
        <div class="setup-box">
            <h2>팀 이름 설정</h2>
            <div class="team-inputs">
                <div class="team-row"><span class="dot" style="background:#ef4444"></span><input id="team-name-0" type="text" value="팀 1" maxlength="8"></div>
                <div class="team-row"><span class="dot" style="background:#3b82f6"></span><input id="team-name-1" type="text" value="팀 2" maxlength="8"></div>
                <div class="team-row"><span class="dot" style="background:#22c55e"></span><input id="team-name-2" type="text" value="팀 3" maxlength="8"></div>
                <div class="team-row"><span class="dot" style="background:#f59e0b"></span><input id="team-name-3" type="text" value="팀 4" maxlength="8"></div>
            </div>
            <button onclick="startGame()">🎮 게임 시작</button>
        </div>
        <div class="setup-info">
            <p>100칸 보드에서 15라운드, 60번 선택!</p>
            <p>🎁 보물 36개 (일반25·특수5·황금2·투명2·폭탄2)</p>
            <p>🪤 함정 3개 — 즉시 공개, 다음 턴 패스</p>
            <p>💣 폭탄 — 주변 열쇠 파괴 + -5점</p>
            <p style="color:#475569;font-size:0.8rem">숫자 힌트가 진한 빨간색이면 고가 열쇠/폭탄이 근처에 있다는 신호!</p>
        </div>
    </div>
</div>

<!-- ───── 게임 화면 ───── -->
<div id="game-screen" class="screen">
    <div class="game-layout">

        <!-- 좌측: 보물 현황 -->
        <div class="left-panel">
            <div class="panel-title">보물 현황</div>
            <div id="score-list"></div>
            <div class="game-hint-note">🔒 종료 후 상세 공개</div>
        </div>

        <!-- 중앙: 보드 -->
        <div class="center-panel">
            <div class="game-header">
                <div class="hbadge">라운드 <span id="current-round">1</span> / 15</div>
                <div class="game-title">🎁 열쇠 모으기</div>
                <div class="hbadge">선택 <span id="total-picks">0</span> / 60</div>
            </div>
            <div id="board" class="board"></div>
        </div>

        <!-- 우측: 턴 패널 -->
        <div class="right-panel">

            <!-- 순위 입력 -->
            <div id="ranking-phase">
                <div class="panel-title">⚡ 미니게임 순위</div>
                <p class="sub-desc">이번 라운드 팀 순서를 설정하세요</p>
                <div id="ranking-inputs"></div>
                <button class="confirm-btn" onclick="confirmRanking()">✅ 순서 확정</button>
                <button class="random-btn" onclick="randomRanking()">🎲 랜덤 순서</button>
            </div>

            <!-- 칸 선택 -->
            <div id="selection-phase" style="display:none;flex-direction:column;gap:0.6rem">
                <div class="panel-title">🎯 칸 선택</div>
                <div id="turn-order-display"></div>
                <div id="current-team-box"></div>
                <div id="last-result" class="result-box"></div>
            </div>

        </div>
    </div>
</div>

<!-- ───── 공개 화면 ───── -->
<div id="reveal-screen" class="screen">
    <div class="reveal-layout">

        <!-- 보드 -->
        <div class="reveal-board-area">
            <div id="reveal-board" class="board"></div>
        </div>

        <!-- 공개 패널 -->
        <div class="reveal-panel">
            <div id="reveal-stage-title" class="reveal-title"></div>
            <div id="reveal-scores"></div>
            <div id="reveal-detail" class="reveal-detail"></div>
            <button id="reveal-next-btn" class="reveal-next-btn" onclick="nextRevealStep()">다음 ▶</button>
        </div>

    </div>
</div>

<script src="game.js"></script>
</body>
</html>
